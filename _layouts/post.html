<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- MathJax -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css">
  <style>
    .post-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
    }

    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }

    .post-back:hover {
      color: var(--ink);
    }

    .post-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #ebebeb;
    }

    .post-date {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--ink);
      color: #fff;
      padding: 0.18rem 0.55rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    .post-title {
      font-size: 1.75rem !important;
      font-weight: 800;
      line-height: 1.25;
      color: var(--ink);
      margin-bottom: 0.75rem;
      padding-bottom: 0 !important;
    }

    .post-reader-note {
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      border-left: 3px solid var(--ink);
      background: #f9f9f9;
      border-radius: 0 6px 6px 0;
    }

    .post-reader-note-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.3rem;
    }

    .post-reader-note p {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.55;
    }

    .post-body {
      font-size: 0.975rem;
      line-height: 1.75;
      color: #222;
    }

    .post-body p {
      margin-bottom: 1.1rem;
      color: #333;
      line-height: 1.75;
    }

    .post-body h2 {
      font-size: 1.2rem !important;
      font-weight: 800;
      color: var(--ink);
      margin-top: 2rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0 !important;
    }

    .post-body h3 {
      font-size: 1rem !important;
      font-weight: 700;
      color: var(--ink);
      margin-top: 1.5rem;
      margin-bottom: 0.4rem;
    }

    .post-body h4 {
      font-size: 0.95rem !important;
      font-weight: 700;
      color: var(--ink);
      margin-top: 1.25rem;
      margin-bottom: 0.35rem;
    }

    .post-body a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .post-body blockquote {
      border-left: 3px solid #ddd;
      padding-left: 1rem;
      margin-left: 0;
      color: #555;
      font-style: italic;
    }

    .post-body img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #e5e5e5;
      display: block;
      margin: 1.5rem auto;
    }

    .post-body pre {
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 1rem 1.1rem;
      overflow-x: auto;
      font-size: 0.875rem;
    }

    .post-body code {
      background: #f3f4f6;
      color: #111;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-size: 0.875em;
    }

    .post-body pre code {
      background: none;
      color: inherit;
      padding: 0;
    }

    .post-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin: 1.25rem 0;
    }

    .post-body th {
      background: #f5f5f5;
      font-weight: 700;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e5e5e5;
    }

    .post-body td {
      padding: 0.45rem 0.75rem;
      border: 1px solid #e5e5e5;
    }

    .post-body ul, .post-body ol {
      padding-left: 1.4rem;
      margin-bottom: 1rem;
    }

    .post-body li {
      margin-bottom: 0.35rem;
      line-height: 1.65;
    }

    .scroll-watcher-bar {
      height: 2px;
      position: fixed;
      top: 0;
      z-index: 1000;
      background: var(--ink);
      width: 100%;
      transform-origin: left;
      transform: scaleX(0);
      animation: scroll-watcher-bar linear;
      animation-timeline: scroll();
      animation-duration: auto;
    }
  </style>
</head>

<body class="page">
  <div class="scroll-watcher-bar"></div>

  <div class="post-wrap">

    <a href="/blogs.html" class="post-back">&#8592; All posts</a>

    <header class="post-header">
      {% if page.date %}
      <span class="post-date">{{ page.date | date: "%b %Y" }}</span>
      {% endif %}
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.reader_note %}
      <div class="post-reader-note">
        <p class="post-reader-note-label">{{ page.reader_note_title | default: "Note" }}</p>
        <p>{{ page.reader_note }}</p>
      </div>
      {% endif %}
    </header>

    <div class="post-body">
      {{ content }}
    </div>

  </div>
</body>
</html>
